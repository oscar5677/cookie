name: Update Cookie Every Hour

on:
  schedule:
    - cron: '0 */1 * * *'   # Every 1 hour (UTC)
  workflow_dispatch:        # Allow manual run from Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x scripts/update_cookie.sh

      - name: Run cookie update script
        run: ./scripts/update_cookie.sh

      - name: Commit changes if cookie updated
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add cookie.txt

          # If no changes, stop here (no spam commit)
          if git diff --cached --quiet; then
            echo "No changes detected. Skipping commit."
            exit 0
          fi

          git commit -m "Auto update cookie"
          git push
